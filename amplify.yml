version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 20 || nvm install 20 && nvm use 20
        - node --version
        - npm --version
        - npm ci --prefer-offline
    build:
      commands:
        - npm run build
        - ls -la out/ || echo "WARNING: out/ directory not found!"
  artifacts:
    baseDirectory: out
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
